name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint + Type + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (dev + docs)
        run: uv sync --extra dev --extra docs

      - name: Ruff lint
        run: uv run ruff check src tests api

      - name: Black format check
        run: uv run black --check src tests api

      - name: Mypy strict
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest -m "not slow and not integration"

  literature-brain-integrity:
    name: Literature brain integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --extra dev --extra docs
      - name: Run brain-integrity tests
        run: uv run pytest tests/test_literature_brain.py -v
